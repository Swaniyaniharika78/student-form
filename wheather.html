<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wheather Card</title>

</head>
<body>
    <div class="weather-card">
        <div class="location">
        <div class="city">Patna</div>
        <div class="date">Sunday, July 13, 2025</div>
        </div>

    <div class="main-weather">
        <div class="weather-icon">☀️</div>
        <div class="temperature">24°C</div>
        <div class="description">Sunny</div>
    </div>

    <div class="weather-details">
        <div class="detail-item">
            <div class="detail-icon">💧</div>
            <div class="detail-value">65%</div>
            <div class="detail-lebal">Humidity</div>

        </div>
        <div class="detail-item">
            <div class="detail-icon">💨</div>
            <div class="detail-value">12 km/hr</div>
            <div class="detail-label">Wind Speed</div>
        </div>
        <div class="detail-item">
            <div class="detail-icon">👁️</div>
            <div class="detail-value">8km</div>
            <div class="detail-label">Visibility</div>
        </div>
    </div>

         <div class="forecast">
            <div class="forecast-title">5-Day Forecast</div>
            <div class="forecast-items">
                <div class="forecast-item">
                    <div class="forecast-day">TUE</div>
                    <div class="forecast-icon">⛅</div>
                    <div class="forecast-temp">22° <span class="low">15°</span></div>
                </div>
                <div class="forecast-item">
                    <div class="forecast-day">WED</div>
                    <div class="forecast-icon">🌧️</div>
                    <div class="forecast-temp">18° <span class="low">12°</span></div>
                </div>
                <div class="forecast-item">
                    <div class="forecast-day">THU</div>
                    <div class="forecast-icon">⛈️</div>
                    <div class="forecast-temp">20° <span class="low">14°</span></div>
                </div>
                <div class="forecast-item">
                    <div class="forecast-day">FRI</div>
                    <div class="forecast-icon">☀️</div>
                    <div class="forecast-temp">26° <span class="low">18°</span></div>
                </div>
                <div class="forecast-item">
                    <div class="forecast-day">SAT</div>
                    <div class="forecast-icon">☁️</div>
                    <div class="forecast-temp">23° <span class="low">16°</span></div>

            </div>
        </div>
    </div>
    </div>
</body>
</html>
